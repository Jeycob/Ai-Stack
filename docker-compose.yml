version: "3.8"

services:
  # Open WebUI - rozhrani pro AI
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "9090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - OLLAMA_BASE_URL=http://192.168.0.48:11434
      - WEBUI_URL=http://192.168.0.48:9090

      # Pro OpenWebUI tool "Aider Container Access"
      - AIDER_CONTAINER_NAME=aider
      - AIDER_WORKSPACE=/Repositories
      - AIDER_MODEL=ollama/qwen2.5-coder:14b

    volumes:
      - open-webui-data:/app/backend/data
      - /mnt/c/Repositories:/data/repositories

      # Nutne: OpenWebUI diky tomu muze pres Docker API execnout do Aider kontejneru
      - /var/run/docker.sock:/var/run/docker.sock

  # Aider - AI asistent pro kodovani
  aider:
    image: paulgauthier/aider:latest
    container_name: aider
    restart: always
    working_dir: /Repositories/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AIDER_MODEL=ollama/qwen2.5-coder:14b
      - OLLAMA_API_BASE=http://192.168.0.48:11434
      - OLLAMA_BASE_URL=http://192.168.0.48:11434
      - OPENAI_API_BASE=http://host.docker.internal:11434/v1
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1
      - OPENAI_API_KEY=not-needed
      - AIDER_ANALYTICS=false
      - AIDER_CHECK_UPDATE=false
    volumes:
      - /mnt/c/Repositories:/Repositories

      # Volitelne jen pokud Aider sam potrebuje Docker. Pro samotne volani z OpenWebUI neni nutne.
      - /var/run/docker.sock:/var/run/docker.sock

    tty: true
    stdin_open: true
    command: tail -f /dev/null

volumes:
  open-webui-data: