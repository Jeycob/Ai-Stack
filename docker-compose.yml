services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "9090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - OLLAMA_BASE_URL=http://192.168.0.48:11434
      - WEBUI_URL=http://192.168.0.48:9090
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - CODEX_GATEWAY_PUBLIC_URL=http://192.168.0.48:9101
      - CODEX_GATEWAY_ADMIN_TOKEN_FILE=/data/repositories/ai-stack/codex/state/codex-gateway-admin.token
    volumes:
      - open-webui-data:/app/backend/data
      - /mnt/c/Repositories:/data/repositories
      - /mnt/c/Repositories/ai-stack/openwebui/loader.js:/app/backend/open_webui/static/loader.js:ro
      - /mnt/c/Repositories/ai-stack/openwebui/loader.js:/app/build/static/loader.js:ro

volumes:
  open-webui-data:
